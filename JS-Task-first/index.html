<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting | JavaScript</title>
    <link rel="stylesheet" href="design.css">

    <style>
        :root {
            --bg-main: #121212;
            --text-main: #f0f0f0;
            --card-gradient: linear-gradient(145deg, #7a1010, #2b0404);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            --btn-bg: rgba(255, 255, 255, 0.1);
            --btn-hover: rgba(255, 255, 255, 0.2);
            --accent: #ff4d4d;
        }

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box; 
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1rem;
        }

        header {
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to right, #ff4d4d, #b30000);
            
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            background-clip: text;
            color: transparent;
        }

        article {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
            width: 100%;
            max-width: 1200px;
        }

        article > div:first-child {
            background: rgba(255, 255, 255, 0.05);
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 600px;
        }

        article > div:first-child p {
            font-size: 1.2rem;
            margin: 1rem 0;
        }

        article > div:first-child span {
            color: var(--accent);
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 1px;
        }

        article > div:last-child {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center;
            gap: 2rem;
            width: 100%;
        }

        section {
            background: var(--card-gradient);
            border-radius: 16px;
            padding: 2rem;
            width: 300px;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255, 100, 100, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        section:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(255, 77, 77, 0.15);
        }

        section h2 {
            font-size: 1.5rem;
            text-align: center;
        }

        section p {
            width: 100%;
            min-height: 48px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 0.75rem;
            text-align: center;
            font-family: monospace;
            color: var(--accent);
            word-break: break-word;
        }

        button {
            background: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        button:hover {
            background: var(--btn-hover);
            border-color: var(--accent);
            transform: scale(1.03);
        }

        button:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <header>
        <h1>Sorting Algorithms</h1>
    </header>

    <article>
        <div>
            <h2>Array generator</h2>
            <p>Your list is [<span></span>]</p>
            <button>Generate new list</button>
        </div>

        <div>
            <section>
                <h2>Bubble Sort</h2>
                <p></p>
                <button>Get sorted</button>
            </section>

            <section>
                <h2>Selection Sort</h2>
                <p></p>
                <button>Get sorted</button>
            </section>

            <section>
                <h2>Insertion Sort</h2>
                <p></p>
                <button>Get sorted</button>
            </section>
        </div>
        
    </article>
    
</body>
</html>
